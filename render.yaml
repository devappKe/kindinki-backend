services:
  - type: web
    name: kindinki-backend
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_WEBHOOK_SECRET
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false